global:
  checkNewVersion: true
  sendAnonymousUsage: false

# Define providers
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: true

# Define entrypoints
entryPoints:
  http:
    address: ":80"
#    http:  # Disable HTTP to HTTPS redirection to use HTTP endpoint for S3 API
#      redirections:
#        entryPoint:
#          to: https
#          scheme: https
#          permanent: true
  https:
    address: ":443"

# Configure the API
api:
  insecure: true
  dashboard: true

# Define TLS
tls:
  certificates:
    - certFile: "/etc/traefik/certificates/cert.pem"
      keyFile: "/etc/traefik/certificates/key.pem"
