[package]
name = "JustTransfer"
version = "0.1.0"
edition = "2021"

[dependencies]

# Security and cryptography
libsodium-sys-stable = "1.22.3"
argon2 = "0.5.3"
opaque-ke = { version = "3.0.0", features = ["ristretto255", "argon2"] }
rand = "0.8.5"

# Web framework and related libraries
axum = { version = "0.8.6", features = ["multipart", "tokio", "macros"]}
axum-extra = { version = "0.10.3", features = ["cookie"]}
http = "1.3.1"
serde = { version = "1.0.219", features = ["derive"] }
tokio = { version = "1.47.1", features = ["full"] }
validator = { version = "0.19", features = ["derive"] }
jsonwebtoken = { version = "9"}

# Database and environment management
dotenvy = "0.15"
diesel = { version = "2.2.0", features = ["postgres", "r2d2", "chrono", "uuid"] }
tower-http = { version = "0.6.6", features = ["cors", "trace"] }
aws-sdk-s3 = "1.115.0"

# Other utilities
base64 = "0.22.1"
uuid = { version = "1.18.1", features = ["v4", "serde"] }
chrono = { version = "0.4.41", features = ["serde"] }
